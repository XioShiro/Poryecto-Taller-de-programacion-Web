<link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">

<body>
    <script>
        // Esperamos a que la página cargue por completo
        document.addEventListener('DOMContentLoaded', function () {
            const formRegistro = document.querySelector('.Formularioregisto');

            formRegistro.addEventListener('submit', function (evento) {
                evento.preventDefault(); // Detiene la redirección automática

                const nombre = document.getElementById('nombre').value.trim();
                const correo = document.getElementById('correo').value.trim();
                const contraseña = document.getElementById('contraseña').value;
                const confirmacion = document.getElementById('confirmacion').value;

                //Validar que las contraseñas coincidan
                if (contraseña !== confirmacion) {
                    alert("❌ Las contraseñas no coinciden. Porfavor vuelva a intentarlo.");
                    return;
                }

                //Traer la base de datos de localStorage
                let usuariosRegistrados = JSON.parse(localStorage.getItem('usuarios')) || [];

                //Validar si el usuario o correo ya existen
                const correoExiste = usuariosRegistrados.some(u => u.correo === correo);
                const nombreExiste = usuariosRegistrados.some(u => u.nombre === nombre);

                if (correoExiste || nombreExiste) {
                    alert("❌ Este usuario o correo ya está registrado. Porfavor ingrese uno nuevo.");
                    return;
                }

                //Guardar si todo está bien
                const nuevoUsuario = {
                    nombre: nombre,
                    correo: correo,
                    contraseña: contraseña
                };

                usuariosRegistrados.push(nuevoUsuario);
                localStorage.setItem('usuarios', JSON.stringify(usuariosRegistrados));

                window.location.href = 'Login.html'; // Redirige manualmente al login
            });
        });
    </script>

        <h1 class="titulo"><strong>Registrar usuario</strong></h1>
        <p>Crea tu cuenta para comenzar a relizar tus pedidos con un descuento increible.</p>

        <form class="Formularioregisto">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required />

            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" required />

            <label for="documento">Tipo de Documento:</label>
            <select class="seleccion" id="documento" name="documento">
                <option value="dni">DNI</option>
                <option value="carnet">Carnet de extrangeria</option>
            </select>
            <label for="numdocumento">Número de Documento:</label>
            <input type="number" id="numdocumento" name="documento" required>

            <label for="correo">Correo electrónico</label>
            <input type="text" id="correo" name="correo" required />
            <label for="contraseña">Contraseña</label>
            <input type="password" id="contraseña" name="contraseña" required />

            <label for="confirmacion">Confirmar Contraseña</label>
            <input type="password" id="confirmacion" name="confirmacion" required />

            <section class="checkbox-container">
                <label>
                    <input type="checkbox" name="terminos" required />
                    Acepto los términos y condiciones
                </label>
            </section>

            <button class="boton" type="submit">Registrarse</button>
        </form>
